# Detekt configuration for Compose Multiplatform
# https://detekt.dev/docs/1.23.8/introduction/compose

build:
  maxIssues: 0

complexity:
  active: true
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 10
    ignoreDefaultParameters: true
  TooManyFunctions:
    active: true
    ignoreAnnotatedFunctions:
      - 'Preview'

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - 'Composable'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][A-Za-z0-9]*'

style:
  active: true
  MagicNumber:
    active: true
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
      - '**/commonTest/**'
      - '**/jvmTest/**'
      - '**/jsTest/**'
      - '**/iosTest/**'
      - '**/desktopTest/**'
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - 'Preview'
